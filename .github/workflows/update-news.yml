name: Обновление новостей ТОЛК

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 lxml
          echo "✅ Установлены: feedparser, requests, beautifulsoup4, lxml"
          pip list | grep -E "feedparser|requests|beautifulsoup4|lxml"
      
      - name: Проверка структуры
        run: |
          echo "📁 Текущая директория: $(pwd)"
          ls -la
          mkdir -p public
          echo "✅ Папка public создана"
      
      - name: Создание serviceAccountKey.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
          echo "✅ serviceAccountKey.json создан"
          ls -la serviceAccountKey.json
      
      - name: Создание config.js
        run: |
          echo "const FIREBASE_CONFIG = {" > public/config.js
          echo "  apiKey: \"AIzaSyCVl5UQVPWKEh-sP72pUN08uqTF7VcY43Y\"," >> public/config.js
          echo "  authDomain: \"tolk-1.firebaseapp.com\"," >> public/config.js
          echo "  projectId: \"tolk-1\"," >> public/config.js
          echo "  storageBucket: \"tolk-1.firebasestorage.app\"," >> public/config.js
          echo "  messagingSenderId: \"79835817899\"," >> public/config.js
          echo "  appId: \"1:79835817899:web:28cd02b155f1d7428754ee\"" >> public/config.js
          echo "};" >> public/config.js
          echo "✅ config.js создан"
          cat public/config.js
      
      - name: Запуск импортера
        run: |
          echo "🚀 ЗАПУСК fetch_news.py"
          echo "========================"
          python fetch_news.py
          echo "========================"
          echo "✅ Скрипт завершен"
      
      - name: Проверка результатов
        run: |
          echo "📊 Проверка созданных файлов:"
          if [ -f public/news_data_v3.json ]; then
            echo "✅ news_data_v3.json существует"
            echo "   Размер: $(wc -l < public/news_data_v3.json) строк"
            echo "   Вес: $(du -h public/news_data_v3.json | cut -f1)"
            echo ""
            echo "📋 Первые 3 новости:"
            head -n 20 public/news_data_v3.json
          else
            echo "❌ news_data_v3.json НЕ создан!"
            exit 1
          fi
          
          if [ -f public/version.json ]; then
            echo ""
            echo "✅ version.json существует"
            cat public/version.json
          fi
      
      - name: Проверка изменений в Git
        id: check_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add public/news_data_v3.json public/version.json
          
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📊 НЕТ новых новостей для коммита"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📊 ЕСТЬ новые новости!"
            echo ""
            echo "📋 Изменения:"
            git diff --staged --stat
          fi
      
      - name: Коммит и пуш изменений
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git commit -m "Автообновление новостей [$(date +'%Y-%m-%d %H:%M')]"
          git push
          echo "✅ Изменения отправлены в репозиторий"
      
      - name: Деплой на Firebase Hosting
        if: steps.check_changes.outputs.changed == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: tolk-1
          channelId: live