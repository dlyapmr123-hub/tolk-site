name: Обновление новостей ТОЛК

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Добавляем права доступа
permissions:
  contents: read
  pull-requests: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Явно устанавливаем Node.js (важно для Firebase Action)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей Python
        run: |
          pip install feedparser requests beautifulsoup4 lxml

      - name: Создание serviceAccountKey.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json

      - name: Создание config.js
        run: |
          echo "const FIREBASE_CONFIG = {" > public/config.js
          echo "  apiKey: \"AIzaSyCVl5UQVPWKEh-sP72pUN08uqTF7VcY43Y\"," >> public/config.js
          echo "  authDomain: \"tolk-1.firebaseapp.com\"," >> public/config.js
          echo "  projectId: \"tolk-1\"," >> public/config.js
          echo "  storageBucket: \"tolk-1.firebasestorage.app\"," >> public/config.js
          echo "  messagingSenderId: \"79835817899\"," >> public/config.js
          echo "  appId: \"1:79835817899:web:28cd02b155f1d7428754ee\"" >> public/config.js
          echo "};" >> public/config.js

      - name: Запуск импортера
        run: python fetch_news.py

      - name: Настройка Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Проверка изменений
        id: check_changes
        run: |
          git add public/news_data_v3.json public/version.json || true

          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Нет новых новостей"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Есть новые новости"
          fi

      - name: Коммит и пуш изменений
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git commit -m "Автообновление новостей [$(date +'%Y-%m-%d %H:%M')]"
          git pull --rebase origin main || true
          git push origin main

      - name: Деплой на Firebase Hosting
        if: steps.check_changes.outputs.changed == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: tolk-1
          channelId: live