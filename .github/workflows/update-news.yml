name: Обновление новостей ТОЛК

on:
  schedule:
    - cron: '*/15 * * * *'  # Каждые 15 минут
  workflow_dispatch:  # Ручной запуск

permissions:
  contents: write  # Явно даём права на запись

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Установка зависимостей
        run: |
          pip install feedparser beautifulsoup4 requests firebase-admin
      
      - name: Создание serviceAccountKey.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
      
      - name: Запуск импортера
        run: python fetch_news.py
      
      - name: Сохраняем изменения
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news_data_v2.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление новостей [$(date)]"
          git push
      
      - name: Деплой на Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: tolk-1
          channelId: live