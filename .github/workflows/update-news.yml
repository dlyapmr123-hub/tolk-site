name: Обновление новостей ТОЛК

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Установка зависимостей
        run: |
          pip install feedparser requests
      
      - name: Создание serviceAccountKey.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
      
      - name: Создание config.js
        run: |
          echo "const FIREBASE_CONFIG = {" > public/config.js
          echo "  apiKey: \"AIzaSyCVl5UQVPWKEh-sP72pUN08uqTF7VcY43Y\"," >> public/config.js
          echo "  authDomain: \"tolk-1.firebaseapp.com\"," >> public/config.js
          echo "  projectId: \"tolk-1\"," >> public/config.js
          echo "  storageBucket: \"tolk-1.firebasestorage.app\"," >> public/config.js
          echo "  messagingSenderId: \"79835817899\"," >> public/config.js
          echo "  appId: \"1:79835817899:web:28cd02b155f1d7428754ee\"" >> public/config.js
          echo "};" >> public/config.js
      
      - name: Запуск импортера
        run: python fetch_news.py
      
      - name: Проверка изменений
        id: check_changes
        run: |
          if git diff --quiet public/news_data_v3.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Нет новых новостей"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Есть новые новости"
          fi
      
      - name: Сохраняем изменения в Git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news_data_v3.json public/version.json
          git commit -m "Автообновление новостей [$(date +'%Y-%m-%d %H:%M')]"
          git push
      
      - name: Деплой на Firebase Hosting
        if: steps.check_changes.outputs.changed == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: tolk-1
          channelId: live